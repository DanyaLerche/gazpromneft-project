openapi: 3.0.3
info:
  title: Task Tracker API
  version: "0.1.0"
  description: |
    Контракты Backend/Frontend для таск-трекера.
    Документ ориентирован на использование в Swagger UI / Redoc и генерацию SDK.

    Базовый префикс всех эндпоинтов: /api/v1
servers:
  - url: http://localhost:8000/api/v1
    description: Основной сервер API

tags:
  - name: ForMe
    description: Главная страница пользователя (For Me)                                                                                                                                                                                                       
  - name: Auth
    description: Аутентификация и сессия пользователя
  - name: Users
    description: Поиск/получение пользователей (для добавления в проекты)
  - name: Projects
    description: Проекты и участники проектов
  - name: Statuses
    description: Проектные статусы (колонки канбана)
  - name: Criticalities
    description: Справочник критичности задач
  - name: Issues
    description: Эпики и задачи (CRUD, фильтры, детальная карточка)
  - name: Links
    description: Произвольные связи между задачами (blocks/relates и т.п.)
  - name: Watchers
    description: Наблюдатели задач
  - name: Comments
    description: Комментарии к задачам
  - name: Attachments
    description: Вложения (presigned upload)
  - name: Wiki
    description: Документация проекта (Confluence-like страницы, версии и вложения)
  - name: Worklogs
    description: Списание часов (учёт трудозатрат по дням)
  - name: Schedules
    description: Управление плановым графиком работы пользователей (расписание, календарь)
  - name: Notifications
    description: Уведомления (in-app + настройки)
  - name: Reports
    description: Агрегированные отчёты (plan/fact, трудозатраты, счётчики задач)
  - name: Dashboards
    description: Дашборды и виджеты (настраиваемые отчётные экраны)

security:
  - bearerAuth: []

paths:
  /for-me:
    get:
      summary: Главная страница пользователя (For Me)
      description: |
        Возвращает агрегированные данные для страницы "Мои задачи".
        Включает:
        - список задач пользователя
        - список доступных проектов
        - метаинформацию для фильтров (справочники статусов и пользователей)
        Задачи включают:
        - задачи где пользователь исполнитель
        - задачи где пользователь автор
        - задачи где пользователь наблюдатель
      tags:
        - ForMe
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: |
            Поиск задач по:
            - ключу задачи (PAY-123)
            - названию задачи
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
          description: Фильтр по проекту
        - name: status_id
          in: query
          schema:
            type: string
            format: uuid
          description: Фильтр по статусу
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - created_at
              - updated_at
              - due_date
          description: Поле сортировки
        - name: last_seen_timestamp
          in: query
          schema:
            type: string
            format: date-time
          description: |
            Временная отметка последнего просмотра /for-me.
            Используется для формирования мини-дайджеста изменений.
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Данные страницы For Me (агрегированный дашборд пользователя)
          content:
            application/json:
              schema:
                type: object
                required: [issues, projects, total, filters, mini_digest, action_history]
                properties:
                  issues:
                    type: array
                    description: |
                      Список задач пользователя.
                    items:
                      $ref: '#/components/schemas/Issue'
                  projects:
                    type: array
                    description: |
                      Проекты доступные пользователю.
                    items:
                      $ref: '#/components/schemas/Project'
                  total:
                    type: integer
                    description: |
                      Общее количество задач
                      для пагинации.
                  filters:
                    type: object
                    required: [statuses, users]
                    properties:
                      statuses:
                        type: array
                        items:
                          $ref: '#/components/schemas/Status'
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
                  mini_digest:
                    type: object
                    required: [last_seen_timestamp, generated_at, items]
                    properties:
                      last_seen_timestamp:
                        type: string
                        format: date-time
                        nullable: true
                      generated_at:
                        type: string
                        format: date-time
                      items:
                        type: array
                        maxItems: 5
                        items:
                          type: object
                          required:
                            - item_type
                            - issue_id
                            - issue_key
                            - issue_title
                            - project_id
                            - occurred_at
                            - summary
                          properties:
                            item_type:
                              type: string
                              enum: [issue_updated, new_comment]
                            issue_id:
                              $ref: "#/components/schemas/UUID"
                            issue_key:
                              type: string
                            issue_title:
                              type: string
                            project_id:
                              $ref: "#/components/schemas/UUID"
                            occurred_at:
                              type: string
                              format: date-time
                            summary:
                              type: string
                  action_history:
                    type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        maxItems: 5
                        items:
                          type: object
                          required:
                            - action_type
                            - issue_id
                            - issue_key
                            - issue_title
                            - project_id
                            - occurred_at
                            - summary
                          properties:
                            action_type:
                              type: string
                              enum: [issue_created, comment_added, worklog_added]
                            issue_id:
                              $ref: "#/components/schemas/UUID"
                            issue_key:
                              type: string
                            issue_title:
                              type: string
                            project_id:
                              $ref: "#/components/schemas/UUID"
                            occurred_at:
                              type: string
                              format: date-time
                            summary:
                              type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"


  /auth/login:
    post:
      operationId: login
      tags: [Auth]
      security: []
      summary: Вход (получение JWT-токенов)
      description: |
        Аутентификация пользователя по email/паролю (или прокси к SSO — зависит от реализации).
        Возвращает access_token (для Authorization Bearer) и refresh_token (для продления сессии).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Токены + профиль пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/register:
    post:
      operationId: register
      tags: [Auth]
      security: []
      summary: Регистрация пользователя
      description: |
        Создает нового пользователя в системе.
        Используется при первом входе в систему.
        После регистрации пользователь может выполнить login.

        В MVP регистрация может быть открытой.
        В production возможно ограничение (например, только по корпоративной почте).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Пользователь с таким email уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      security: []
      summary: Обновление access_token по refresh_token
      description: |
        Используется, когда access_token истёк.
        Refresh-токен должен быть действующим (не отозван и не истёк).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Новый access_token (+ возможно новый refresh_token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Выход (инвалидация refresh_token)
      description: |
        Делает refresh_token недействительным. Access_token обычно живёт до истечения TTL.
      responses:
        "204":
          description: Успешный выход

  /me:
    get:
      operationId: getMe
      tags: [Auth]
      summary: Текущий пользователь
      description: |
        Возвращает профиль пользователя по access_token.
        Полезно для инициализации фронтенда после перезагрузки страницы.
      responses:
        "200":
          description: Профиль пользователя
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users:
    get:
      operationId: searchUsers
      tags: [Users]
      summary: Поиск пользователей
      description: |
        Используется в UI при добавлении участников в проект.
        Обычно ищем по email/ФИО.
      parameters:
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список пользователей с пагинацией
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedUsers"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [Users]
      summary: Получить пользователя по ID
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Пользователь
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects:
    get:
      operationId: listProjects
      tags: [Projects]
      summary: Список проектов текущего пользователя
      description: |
        Возвращает проекты, где пользователь является участником (или создателем).
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список проектов с пагинацией
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedProjects"
    post:
      operationId: createProject
      tags: [Projects]
      summary: Создать проект
      description: |
        Создаёт проект с уникальным key (например PAY).
        Обычно доступно только пользователям с соответствующими правами (в MVP — любому авторизованному).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Проект создан
          content:
            application/json:
              schema:
                type: object
                required: [project]
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [Projects]
      summary: Получить проект
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Проект
          content:
            application/json:
              schema:
                type: object
                required: [project]
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/onboarding/recommendations:
    get:
      operationId: getOnboardingRecommendations
      tags: [Projects]
      summary: Получить onboarding-рекомендации по проекту
      description: |
        Возвращает рекомендации для onboarding на основе проектных данных:
        - reads (Wiki pages)
        - issues_to_review (Issues)
        - key_people (Users)
        Для каждого элемента возвращается reason и опциональный score.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: force
          in: query
          required: false
          description: Принудительно пересчитать рекомендации, игнорируя кэш.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Onboarding-рекомендации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingRecommendationsResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/me/preferences:
    get:
      operationId: getMyProjectPreferences
      tags: [Projects]
      summary: Получить персональные настройки проекта
      description: |
        Возвращает настройки текущего пользователя для конкретного проекта.
        Сейчас используется для флага new_employee_mode.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Настройки текущего пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOnboardingPreferencesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMyProjectPreferences
      tags: [Projects]
      summary: Обновить персональные настройки проекта
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectOnboardingPreferencesRequest"
      responses:
        "200":
          description: Настройки обновлены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOnboardingPreferencesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/onboarding/assignees:
    get:
      operationId: getProjectOnboardingAssignees
      tags: [Projects]
      summary: Получить список назначенных onboarding-пользователей
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Пользователи, которым назначен onboarding-режим
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOnboardingAssigneesResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateProjectOnboardingAssignees
      tags: [Projects]
      summary: Назначить onboarding-пользователей проекта
      description: |
        Обновляет полный список участников, которым показывается New Employee onboarding.
        Требует роль admin_project.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectOnboardingAssigneesRequest"
      responses:
        "200":
          description: Список назначений обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOnboardingAssigneesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/users:
    get:
      operationId: listProjectUsers
      tags: [Projects]
      summary: Список участников проекта
      description: |
        Возвращает участников и их роли. Используется в экране "Участники проекта".
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Участники проекта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedProjectUsers"
    post:
      operationId: addProjectUser
      tags: [Projects]
      summary: Добавить пользователя в проект
      description: |
        Требует роль project_admin в данном проекте.
        В MVP инвайт выполняется по user_id (без email-приглашений).
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProjectUserRequest"
      responses:
        "201":
          description: Пользователь добавлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectUser"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{projectId}/users/{userId}:
    delete:
      operationId: removeProjectUser
      tags: [Projects]
      summary: Удалить пользователя из проекта
      description: |
        Требует роль project_admin.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Пользователь удалён
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/statuses:
    get:
      operationId: listStatuses
      tags: [Statuses]
      summary: Получить статусы проекта
      description: |
        Статусы — это "колонки" канбана (Todo / In progress / Done и т.п.).
        Категория статуса (todo/in_progress/done) важна для бизнес-правил (например, resolved_at).
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Статусы
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Status"
    post:
      operationId: createStatus
      tags: [Statuses]
      summary: Создать статус
      description: |
        Требует project_admin.
        sort_order позволяет управлять порядком колонок в UI.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStatusRequest"
      responses:
        "201":
          description: Статус создан
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    $ref: "#/components/schemas/Status"
        "403":
          $ref: "#/components/responses/Forbidden"

  /statuses/{statusId}:
    patch:
      operationId: updateStatus
      tags: [Statuses]
      summary: Обновить статус
      description: Требует project_admin.
      parameters:
        - $ref: "#/components/parameters/StatusId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Статус обновлён
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    $ref: "#/components/schemas/Status"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: deleteStatus
      tags: [Statuses]
      summary: Удалить статус
      description: Требует project_admin.
      parameters:
        - $ref: "#/components/parameters/StatusId"
      responses:
        "204":
          description: Статус удалён
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /criticalities:
    get:
      operationId: listCriticalities
      tags: [Criticalities]
      summary: Справочник критичности
      description: |
        Возвращает уровни критичности (например Low/Medium/High).
        Используется в UI для сортировки/приоритезации задач.
      responses:
        "200":
          description: Критичности
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Criticality"

  /projects/{projectId}/issues:
    get:
      operationId: listIssues
      tags: [Issues]
      summary: Список задач/эпиков с фильтрами
      description: |
        Основной эндпоинт для доски/таблицы задач.
        Поддерживает фильтры по статусу, исполнителю, автору, родителю, датам и поиску по ключу/заголовку.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: type
          in: query
          description: Тип сущности (epic или task). Если не передан — возвращаем оба.
          schema:
            $ref: "#/components/schemas/IssueType"
        - name: status_id
          in: query
          description: Фильтр по статусу.
          schema:
            $ref: "#/components/schemas/UUID"
        - name: assignee_id
          in: query
          description: Фильтр по исполнителю.
          schema:
            $ref: "#/components/schemas/UUID"
        - name: author_id
          in: query
          description: Фильтр по автору.
          schema:
            $ref: "#/components/schemas/UUID"
        - name: parent_id
          in: query
          description: Фильтр по родительской задаче (иерархия).
          schema:
            $ref: "#/components/schemas/UUID"
        - name: created_from
          in: query
          description: Нижняя граница даты создания (включительно).
          schema:
            $ref: "#/components/schemas/DateTime"
        - name: created_to
          in: query
          description: "Верхняя граница даты создания (см. реализацию: включительно/исключительно)."
          schema:
            $ref: "#/components/schemas/DateTime"
        - name: taken_in_work_from
          in: query
          description: Фильтр по дате взятия в работу.
          schema:
            $ref: "#/components/schemas/DateTime"
        - name: taken_in_work_to
          in: query
          description: Фильтр по дате взятия в работу.
          schema:
            $ref: "#/components/schemas/DateTime"
        - name: resolved_from
          in: query
          description: Фильтр по дате завершения.
          schema:
            $ref: "#/components/schemas/DateTime"
        - name: resolved_to
          in: query
          description: Фильтр по дате завершения.
          schema:
            $ref: "#/components/schemas/DateTime"
        - $ref: "#/components/parameters/Q"
        - name: sort
          in: query
          description: Поле сортировки списка.
          schema:
            type: string
            enum: [created_at, taken_in_work_at, resolved_at, due_date]
        - name: order
          in: query
          description: Направление сортировки.
          schema:
            type: string
            enum: [asc, desc]
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список задач
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedIssues"
    post:
      operationId: createIssue
      tags: [Issues]
      summary: Создать задачу/эпик
      description: |
        Создаёт сущность (epic/task). Поле key генерируется бэкендом (например PAY-123).
        Для задач onboarding и сигналов используйте единый источник правил:
        `backend/docs/onboarding_signals.md`.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
            examples:
              newEmployeeOnboardingMvpEpic:
                summary: Epic для MVP режима «Новый сотрудник»
                description: |
                  Epic фиксирует MVP-скоуп авто-onboarding:
                  - рекомендации по Wiki;
                  - рекомендации по Issues;
                  - рекомендации по ключевым людям (Users);
                  с объяснением «почему это важно» для каждого блока.
                value:
                  type: epic
                  title: Режим «Новый сотрудник» авто-onboarding (MVP)
                  description: Система автоматически рекомендует что читать (Wiki), какие задачи посмотреть (Issues), кто ключевые люди (Users). Только на основе данных проекта (активность, связи, роли), без вручную написанных гайдов.
                  status_id: "00000000-0000-0000-0000-000000000001"
              designOnboardingSignalsTask:
                summary: Task на проектирование сигналов onboarding (под эпиком)
                description: |
                  Создание task в эпике onboarding c parent_id=<EPIC_ID>.
                  Формулы/эвристики и формат ответа API описаны в:
                  `backend/docs/onboarding_signals.md`.
                value:
                  type: task
                  title: Спроектировать сигналы из реальных данных (что считаем важным)
                  description: Зафиксировать таблицы/факты, формулы важности и explainability (reason + score). См. backend/docs/onboarding_signals.md
                  status_id: "00000000-0000-0000-0000-000000000001"
                  parent_id: "00000000-0000-0000-0000-000000000099"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                type: object
                required: [issue]
                properties:
                  issue:
                    $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"

