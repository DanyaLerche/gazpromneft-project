  /users/{userId}/schedules:
    get:
      operationId: listUserSchedules
      tags: [Schedules]
      summary: Получить график работы пользователя за период
      description: |
        Возвращает записи планового графика для указанного пользователя.
        - Обычный пользователь может запросить только свой график.
        - Администратор проекта может запросить график участников своего проекта.
        - Администратор приложения — любого пользователя.
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список записей графика
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedSchedules"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: createSchedule
      tags: [Schedules]
      summary: Создать запись графика
      description: |
        Добавляет новую запись планового графика для пользователя.
        Если запись на указанную дату уже существует, возвращает ошибку 409 Conflict.
        Права: пользователь может создать запись для себя; администратор проекта — для участников своего проекта.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
      responses:
        "201":
          description: Запись создана
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule:
                    $ref: "#/components/schemas/Schedule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /schedules/{scheduleId}:
    patch:
      operationId: updateSchedule
      tags: [Schedules]
      summary: Обновить запись графика
      description: |
        Изменяет плановые часы и/или комментарий существующей записи.
        Права: пользователь может редактировать только свои записи; администратор проекта — записи участников своего проекта.
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleRequest"
      responses:
        "200":
          description: Запись обновлена
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule:
                    $ref: "#/components/schemas/Schedule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteSchedule
      tags: [Schedules]
      summary: Удалить запись графика
      description: |
        Удаляет запись планового графика.
        Права: пользователь может удалить только свои записи; администратор проекта — записи участников своего проекта.
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "204":
          description: Запись удалена
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  x-duplicate-project-schedules:
    get:
      operationId: listProjectSchedules
      tags: [Schedules]
      summary: Получить график работы участников проекта
      description: |
        Возвращает записи планового графика для всех участников указанного проекта.
        Доступно только администратору проекта.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список записей графика с информацией о пользователях
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedSchedulesWithUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/schedules:
    get:
      operationId: listProjectSchedules
      tags: [Schedules]
      summary: Получить график работы участников проекта
      description: |
        Возвращает записи планового графика для всех участников указанного проекта.
        Доступно только администратору проекта.
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список записей графика с информацией о пользователях
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedSchedulesWithUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
          
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token в заголовке Authorization: Bearer <token>"

  parameters:
    Limit:
      name: limit
      in: query
      description: Максимум элементов на странице (пагинация).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Offset:
      name: offset
      in: query
      description: Смещение от начала списка (пагинация).
      schema:
        type: integer
        minimum: 0
        default: 0
    Q:
      name: q
      in: query
      description: Поисковая строка (зависит от эндпоинта).
      schema:
        type: string
        maxLength: 200
    UserId:
      name: userId
      in: path
      required: true
      description: UUID пользователя.
      schema:
        $ref: "#/components/schemas/UUID"
    ProjectId:
      name: projectId
      in: path
      required: true
      description: UUID проекта.
      schema:
        $ref: "#/components/schemas/UUID"
    IssueId:
      name: issueId
      in: path
      required: true
      description: UUID задачи/эпика.
      schema:
        $ref: "#/components/schemas/UUID"
    WikiPageId:
      name: pageId
      in: path
      required: true
      description: UUID wiki-страницы.
      schema:
        $ref: "#/components/schemas/UUID"
    StatusId:
      name: statusId
      in: path
      required: true
      description: UUID статуса.
      schema:
        $ref: "#/components/schemas/UUID"
    IssueKey:
      name: issueKey
      in: path
      required: true
      description: Человекочитаемый ключ задачи (например PAY-123).
      schema:
        type: string
        pattern: "^[A-Z]{2,10}-\\d+$"
        example: PAY-123
    LinkId:
      name: linkId
      in: path
      required: true
      description: UUID связи.
      schema:
        $ref: "#/components/schemas/UUID"
    CommentId:
      name: commentId
      in: path
      required: true
      description: UUID комментария.
      schema:
        $ref: "#/components/schemas/UUID"
    AttachmentId:
      name: attachmentId
      in: path
      required: true
      description: UUID вложения.
      schema:
        $ref: "#/components/schemas/UUID"
    WikiAttachmentId:
      name: attachmentId
      in: path
      required: true
      description: UUID вложения wiki-страницы.
      schema:
        $ref: "#/components/schemas/UUID"
    WorklogId:
      name: worklogId
      in: path
      required: true
      description: UUID списания.
      schema:
        $ref: "#/components/schemas/UUID"
    DashboardId:
      name: dashboardId
      in: path
      required: true
      description: UUID дашборда.
      schema:
        $ref: "#/components/schemas/UUID"
    WidgetId:
      name: widgetId
      in: path
      required: true
      description: UUID виджета.
      schema:
        $ref: "#/components/schemas/UUID"
    ScheduleId:
      name: scheduleId
      in: path
      required: true
      description: UUID записи графика.
      schema:
        $ref: "#/components/schemas/UUID"
    DateFrom:
      name: from
      in: query
      description: Начало периода (включительно). Формат YYYY-MM-DD.
      schema:
        $ref: "#/components/schemas/Date"
    DateTo:
      name: to
      in: query
      description: Конец периода (включительно). Формат YYYY-MM-DD.
      schema:
        $ref: "#/components/schemas/Date"

  responses:
    BadRequest:
      description: Ошибка запроса / ошибка валидации
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Нет прав
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Конфликт
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    UUID:
      type: string
      format: uuid
      description: UUID v4.
      example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
    Date:
      type: string
      format: date
      description: Дата (YYYY-MM-DD).
      example: "2026-03-02"
    DateTime:
      type: string
      format: date-time
      description: ISO 8601 datetime (с таймзоной).
      example: "2026-03-02T10:15:30Z"
    Numeric:
      type: number
      format: double
      description: Число (допускаются дробные значения).

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          description: Поле запроса.
        reason:
          type: string
          description: Причина.

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Код ошибки.
          example: VALIDATION_ERROR
        message:
          type: string
          description: Текст ошибки.
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
        request_id:
          type: string
          description: ID запроса.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/Error"

    RegisterRequest:
      type: object
      required: [email, full_name, password]
      properties:
        email:
          type: string
          format: email
          description: Email пользователя (логин).
        full_name:
          type: string
          description: Полное имя пользователя.
