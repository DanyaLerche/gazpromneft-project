services:
  postgres:
    image: postgres:16
    container_name: task-tracker-postgres
    environment:
      POSTGRES_DB: opd
      POSTGRES_USER: opd
      POSTGRES_PASSWORD: opd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opd -d opd"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: task-tracker-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # `curl` is not reliably present in all minio image variants.
      # `mc ready local` is the upstream-recommended readiness probe.
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-create-buckets:
    image: minio/mc:latest
    container_name: task-tracker-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/jira-attachments || true &&
      mc anonymous set download local/jira-attachments || true
      "

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: task-tracker-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: opd
      DB_PASS: opd
      DB_NAME: opd
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: jira-attachments
      S3_USE_SSL: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-buckets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: task-tracker-frontend
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_healthy

  swagger:
    image: swaggerapi/swagger-ui:latest
    container_name: task-tracker-swagger
    ports:
      - "8080:8080"
    volumes:
      - ./backend/openapi:/openapi:ro
    environment:
      SWAGGER_JSON: /openapi/openapi-v0.1.0.yaml

volumes:
  pgdata:
  minio_data:
