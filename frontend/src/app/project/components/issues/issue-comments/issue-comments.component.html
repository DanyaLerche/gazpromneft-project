<div *ngIf="issue?.comments?.length; else emptyCommentsTmpl">
    <issue-comment *ngFor="let comment of issue?.comments"
                   [comment]="comment">
    </issue-comment>
</div>

<ng-template #emptyCommentsTmpl>
    <div class="rounded border border-dashed border-borderLight px-4 py-5 text-sm text-textMedium">
        Комментариев пока нет.
    </div>
</ng-template>
