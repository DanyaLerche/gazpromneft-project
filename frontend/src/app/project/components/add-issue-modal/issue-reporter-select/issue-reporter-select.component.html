<project-inline-select class="w-full"
                       [formControl]="control"
                       [items]="users"
                       valueKey="id"
                       labelKey="name"
                       [selectedTemplate]="selectedReporterTmpl"
                       [optionTemplate]="optionTemplate">
</project-inline-select>
<ng-template #optionTemplate
             let-user>
    <j-user [user]="user"></j-user>
</ng-template>
<ng-template #selectedReporterTmpl
             let-selected>
    <j-user [user]="selected"></j-user>
</ng-template>
